version: '3.9'

services:
  # ---- Frontend (Next.js) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dcgd-frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
      - NEXT_PUBLIC_APP_NAME=Delhi CM Grievance Dashboard
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - dcgd-network
    restart: unless-stopped

  # ---- Backend (Express) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dcgd-backend
    ports:
      - '5000:5000'
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    networks:
      - dcgd-network
    restart: unless-stopped

  # ---- MongoDB ----
  mongodb:
    image: mongo:7
    container_name: dcgd-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: grievance_db
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - dcgd-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: dcgd-redis
    ports:
      - '6379:6379'
    command: redis-server --requirepass redis_secret_123
    volumes:
      - redis_data:/data
    networks:
      - dcgd-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret_123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- MinIO (S3-compatible Object Storage) ----
  minio:
    image: minio/minio:latest
    container_name: dcgd-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: miniosecret123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - dcgd-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  dcgd-network:
    driver: bridge
